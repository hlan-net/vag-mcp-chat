# Default values for vag-mcp-chat.

image:
  repository: ghcr.io/hlan-net/vag-mcp-chat
  pullPolicy: IfNotPresent
  # Overridden by CI/CD — defaults to chart appVersion
  tag: ""

replicaCount: 1

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 8000

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
  hosts:
    - host: vag-mcp-chat.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Persistence (encrypted VW token store) ────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""   # use cluster default
  accessMode: ReadWriteOnce
  size: 100Mi
  # Mount path inside the container — must match settings.data_dir
  mountPath: /app/data

# ── Environment / secrets ─────────────────────────────────────────────────────
# All sensitive values are read from a Kubernetes Secret.
# Create the secret before deploying:
#
#   kubectl create secret generic vag-mcp-chat-secrets \
#     --from-literal=MCP_JWT_SECRET=$(python -c "import secrets; print(secrets.token_hex(32))") \
#     --from-literal=MCP_FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())") \
#     --from-literal=VW_OIDC_CLIENT_ID=your_client_id \
#     --from-literal=VW_OIDC_CLIENT_SECRET=your_client_secret \
#     --from-literal=OPENAI_API_KEY=sk-...
#
existingSecret: "vag-mcp-chat-secrets"

# Non-sensitive configuration — can be set here or in a ConfigMap
env:
  MCP_BASE_URL: "https://vag-mcp-chat.example.com"
  VW_OIDC_ISSUER: "https://eu-data-act.drivesomethinggreater.com"
  VW_OIDC_SCOPES: "openid profile email vehicle:read"
  VW_DATA_POLL_INTERVAL_SECONDS: "840"
  VW_DEFAULT_VIN: ""
  OPENAI_MODEL: "gpt-4o"

# ── Pod settings ──────────────────────────────────────────────────────────────
podAnnotations: {}
podSecurityContext:
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # false: uvicorn writes .pyc on startup
  runAsNonRoot: true
  runAsUser: 1001
  capabilities:
    drop:
      - ALL

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /.well-known/oauth-authorization-server
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /.well-known/oauth-authorization-server
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

# ── Autoscaling ───────────────────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# ── Node scheduling ───────────────────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
